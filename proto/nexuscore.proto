syntax = "proto3";

package nexuscore;

option go_package = "github.com/V-Tube-Entertainment/NexusCore/api/proto";

import "google/protobuf/timestamp.proto";
import "proto/models.proto";

// ============================================================
// NexusService — Main RPC Service
// ============================================================

service NexusService {
