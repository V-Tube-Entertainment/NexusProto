// ============================================================
// Request/Response Messages
// ============================================================

// --- Registration ---
message RegisterRequest {
    string network_id = 1;
    string server_name = 2;
    string server_type = 3;
}

message RegisterResponse {
    bool success = 1;
    string message = 2;
    string default_currency_code = 3;
    // Populated once the monolith is split into core/chat/health (Phase 8).
    // When empty, the client routes everything back to the core endpoint —
    // backwards-compatible with pre-split plugins.
    ServiceEndpoints endpoints = 20;
}

// --- Service Discovery (Phase 8.4a) ---
// These messages are wire-defined now so plugin clients can consume them
// unchanged once the microservice split lands. Current monolith returns
// empty endpoints and callers fall back to the core host/port.

message Endpoint {
    string host = 1;
    int32 port = 2;
}

message ServiceEndpoints {
    repeated Endpoint chat_endpoints = 1;
    string chat_redis_host = 2;
    int32 chat_redis_port = 3;
    repeated Endpoint health_endpoints = 4;
}

message DiscoverServicesRequest {}

message DiscoverServicesResponse {
    ServiceEndpoints endpoints = 1;
    // Advisory polling interval — clients should re-discover roughly this
    // often to pick up scale events. Zero means the caller may use its own
    // default (5 minutes).
    int32 recommended_refresh_seconds = 2;
}

message HeartbeatRequest {
    string server_name = 1;
    string network_id = 2;
    float tps = 3;
    float mspt = 4;
    float cpu_percent = 5;
    int32 memory_used_mb = 6;
    int32 memory_max_mb = 7;
    int32 player_count = 8;
    int64 uptime_seconds = 9;
}

message HeartbeatResponse {
    bool acknowledged = 1;
    int64 server_time = 2;
}

// --- Punishments ---
message CheckBanRequest {
    string uuid = 1;
    string ip_address = 2;
}

message CheckBanResponse {
    bool banned = 1;
    Punishment punishment = 2;
}

message CheckMuteRequest {
    string uuid = 1;
    string ip_address = 2;
}

message CheckMuteResponse {
    bool muted = 1;
    Punishment punishment = 2;
}

message GetPunishmentRequest {
    int32 id = 1;
}

message ListPunishmentsRequest {
    string type = 1;          // optional filter: BAN, MUTE, KICK, WARN
    string active = 2;        // optional filter: "true", "false", or "" for all
    string network_id = 3;    // optional filter by network
    int32 page_size = 4;
    string page_token = 5;
}

message ListPunishmentsResponse {
    repeated Punishment punishments = 1;
    string next_page_token = 2;
    int32 total_count = 3;
}

message CreatePunishmentRequest {
    string type = 1;
    string target_uuid = 2;
    string target_name = 3;
    string target_ip = 4;
    string reason = 5;
    string staff_uuid = 6;
    string staff_name = 7;
    int32 template_id = 8;
    int64 duration = 9;
    string network_id = 10;
    string server_name = 11;
}

